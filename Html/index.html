<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Based Movie Recommender</title>
    <link rel="stylesheet" href="../CSS/home.css">  
</head>

<body>
    <header>
        <h1 > Mood Based Movie Recommender </h1>
    </header>
    <main>
        <button id="happy">😊 Happy</button>
        <button id="sad">😢 Sad</button>
        <button id="excited">💖 Excited</button>
        <button id="indian_patriotic">🫡 Patriotic</button>
        <button id="relaxed">😌 Relaxed</button>
        <button id="confused">😕 Confused</button>
    </main>
    <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search for a movie...">
        <button id="search-button">Search</button>
    </div>
    <div id="controls">
        <select id="filter">
            <option value="">Filter by Rating</option>
            <option value="7">Above 7</option>
            <option value="8">Above 8</option>
        </select>

        <select id="sort">
            <option value="">Sort By</option>
            <option value="az">A-Z</option>
            <option value="rating">Rating</option>
        </select>
    </div>
    <div id="movieContainer"></div>
    <script src="../JS/home.js"></script>
</body>
</html>
